[build]
  command = "npm run build"
  publish = "public"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run watch"
  port = 8888

[[headers]]
  for = "/widgets.js"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200
