<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Feeds Widgets — Test Page</title>
  <style>
    body { font-family: sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; background: #fff; }
    section { margin-bottom: 60px; }
    h2 { font-size: 14px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  </style>
</head>
<body>

  <section>
    <h2>Google Reviews Widget</h2>
    <div data-widget="google-reviews" data-place-id="YOUR_PLACE_ID_HERE"></div>
  </section>

  <section>
    <h2>Instagram Feed Widget</h2>
    <div data-widget="instagram-feed"></div>
  </section>

  <script src="/widgets.js"></script>
</body>
</html>
